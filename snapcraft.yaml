---
name: marble
confinement: strict
grade: stable
base: core24
adopt-info: marble
apps:
  marble:
    extensions:
      - kde-neon-6
    common-id: org.kde.marble.desktop
    desktop: usr/share/applications/org.kde.marble.desktop
    command: usr/bin/marble
    plugs:
      - audio-record
      - browser-support
    environment:
      QT_PLUGIN_PATH: "$QT_PLUGIN_PATH:$SNAP/usr/lib/$CRAFT_ARCH_TRIPLET/marble"
      QTWEBENGINE_DISABLE_SANDBOX: 1
layout:
  /usr/share/marble:
    symlink: $SNAP/usr/share/marble
  /usr/lib/$CRAFT_ARCH_TRIPLET_BUILD_FOR/marble:
    symlink: $SNAP/usr/lib/$CRAFT_ARCH_TRIPLET_BUILD_FOR/marble
slots:
  session-dbus-interface:
    interface: dbus
    name: org.kde.marble
    bus: session
parts:
  marble:
    parse-info:
      - usr/share/metainfo/org.kde.marble.appdata.xml
    plugin: cmake
    source: .
    source-type: local
    build-packages:
      - libpulse0
    stage-packages:
      - libpulse0
    cmake-parameters:
      - -DCMAKE_INSTALL_PREFIX=/usr
      - -DCMAKE_BUILD_TYPE=Release
      - -DQT_MAJOR_VERSION=6
      - -DBUILD_WITH_QT6=ON
      - -DBUILD_TESTING=OFF
    override-pull: |
        craftctl default
        patch -p0 < ${SNAPCRAFT_PROJECT_DIR}/snap/local/patches/disable_broken_osm_plugin.patch
    prime:
      - -usr/lib/*/cmake/*
      - -usr/include/*
      - -usr/share/ECM/*
      - -usr/share/man/*
      - -usr/bin/X11
      - -usr/lib/gcc/$CRAFT_ARCH_TRIPLET_BUILD_FOR/6.0.0
      - -usr/lib/aspell/*
      - -usr/share/lintian
  cleanup:
    after:
      - marble
    plugin: nil
    build-snaps:
      - core24
      - kf6-core24
    override-prime: |
      set -eux
      for snap in "core24" "kf6-core24"; do
          cd "/snap/$snap/current" && find . -type f,l -exec rm -rf "${CRAFT_PRIME}/{}" \;
      done

